<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}

body{
background:#f5f5f7;
margin:0;
color:#111;
}

/* SECTION */

.section{
margin-bottom:60px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.section-title{
font-size:28px;
font-weight:700;
}

/* VIEW ALL BUTTON */

.view-all{
background:#0071e3;
color:white;
border:none;
padding:8px 16px;
border-radius:20px;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

.view-all:hover{
background:#0062c3;
}

/* HORIZONTAL SCROLL */

.scroll-row{
  display:flex;
  gap:18px;
  overflow-x:auto;
  padding:14px 14px 26px;
  scroll-padding-left:14px;
  scroll-padding-right:14px;
  -webkit-overflow-scrolling:touch;
}

.scroll-row::-webkit-scrollbar{
  display:none;
}

.scroll-row::after{
content:"";
flex:0 0 10px;
}

.scroll-row::-webkit-scrollbar{
display:none;
}

/* MOVIE CARD */

.movie-card{

flex:0 0 220px;

background:white;

border-radius:16px;
overflow:hidden;

box-shadow:0 8px 20px rgba(0,0,0,0.08);

transition:0.25s;

display:flex;
flex-direction:column;

}

.movie-card:hover{
transform:translateY(-4px);
box-shadow:0 14px 30px rgba(0,0,0,0.12);
}

.movie-poster{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
}

/* CONTENT */

.movie-content{
padding:12px;
display:flex;
flex-direction:column;
gap:6px;
}

.movie-title{
font-size:15px;
font-weight:600;
line-height:1.35;
word-break:break-word;
}

.movie-meta{
font-size:12px;
color:#666;
line-height:1.4;
}

/* FILTER CARDS */

.filter-card{

flex:0 0 170px;

background:white;

border-radius:16px;

height:120px;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;
font-weight:600;

box-shadow:0 8px 20px rgba(0,0,0,0.08);

cursor:pointer;

transition:0.2s;

text-decoration:none;
color:#111;

}

.filter-card:hover{

transform:scale(1.05);

box-shadow:0 16px 35px rgba(0,0,0,0.18);

z-index:2;

}

</style>

<link rel="stylesheet" href="css/style.css">

/* LIMIT LIST */

function limitList(list,max=5){

if(list.length<=max){
return list.join(", ")
}

const visible=list.slice(0,max).join(", ")
const hidden=list.length-max

return visible+" +"+hidden

}

/* CREATE MOVIE CARD */

function createMovieCard(movie){

const card=document.createElement("a")

card.href="movie.html?id="+movie.id

card.className="movie-card"

card.innerHTML=`

<img class="movie-poster" src="${movie.poster}">

<div class="movie-content">

<div class="movie-title">
${movie.title}
</div>

<div class="movie-meta">
${movie.year} • ${limitList(movie.genres)}
</div>

<div class="movie-meta">
${limitList(movie.countries)}
</div>

</div>

`

return card

}

/* RENDER MOVIES */

const top10=document.getElementById("top10")
const newest=document.getElementById("newest")

movies.forEach(m=>{
top10.appendChild(createMovieCard(m))
newest.appendChild(createMovieCard(m))
})

/* GENRES */

const genresList=[
"Action",
"Sci-Fi",
"Drama",
"Thriller",
"Fantasy",
"Comedy",
"Horror"
]

const genresContainer=document.getElementById("genres")

genresList.forEach(g=>{

const card=document.createElement("a")

card.className="filter-card"

card.innerText=g

card.href="catalog.html?genre="+encodeURIComponent(g)

genresContainer.appendChild(card)

})

/* YEARS */

const yearsContainer=document.getElementById("years")

for(let y=2024;y>=2000;y--){
